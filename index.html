<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT Interactive Quiz</title>
    <meta name="description" content="Test your knowledge on Information and Communication Technologies">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="app-container">
        <header class="header">
            <h1 class="logo">ICT<span>Quiz</span></h1>
            <div class="progress-container">
                <span id="theme-title" class="theme-title">Select a Theme</span>
                <div class="progress-bar-bg">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <div id="score-display" class="score-display">Score: 0</div>
            </div>
        </header>

        <main class="main-content">
            <!-- View: Theme Selection -->
            <section id="view-themes" class="view active glass-panel">
                <div class="view-header">
                    <h2>Choose a Topic</h2>
                    <p>Select a theme to start your learning journey.</p>
                </div>
                <div id="themes-grid" class="themes-grid">
                    <!-- Theme cards will be generated here by JS -->
                </div>
            </section>

            <!-- View: Quiz -->
            <section id="view-quiz" class="view glass-panel">
                <div class="quiz-header">
                    <button id="btn-back" class="btn btn-secondary">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                        Back
                    </button>
                    <span id="question-counter" class="question-counter">Question 1/10</span>
                </div>
                
                <div class="question-container">
                    <h3 id="question-text" class="question-text">Loading question...</h3>
                    <div id="options-container" class="options-container">
                        <!-- Options generated by JS -->
                    </div>
                </div>
                
                <div class="quiz-footer">
                    <button id="btn-next" class="btn btn-primary" disabled>Next Question</button>
                </div>
            </section>

            <!-- View: Results -->
            <section id="view-results" class="view glass-panel results-panel">
                <h2>Quiz Completed!</h2>
                <div class="score-circle">
                    <svg viewBox="0 0 36 36" class="circular-chart">
                        <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path id="score-path" class="circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <text id="score-text" x="18" y="20.35" class="percentage">0%</text>
                    </svg>
                </div>
                <p id="results-message" class="results-message">Great job!</p>
                <div class="results-actions">
                    <button id="btn-retry" class="btn btn-secondary">Retry Theme</button>
                    <button id="btn-home" class="btn btn-primary">Choose Another Theme</button>
                </div>
            </section>
        </main>
    </div>

    <script src="app2.js"></script>
</body>
</html>
